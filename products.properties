# EnuMind product showcase — deploy-time configuration reference
# The live page reads products.js because browsers can load it directly without a build step.
# This file mirrors the same values as a reference for external tooling.
#
# Add a new product by appending the next index, e.g. product.2.name, product.2.logo, ...
# logo values are paths relative to the site root, or absolute URLs.
# linkLabel is optional and defaults to "Visit site".

product.1.name=Modonome
product.1.logo=assets/modonome-logo.webp
product.1.summary=The autonomous engineering loop that arms only on your command, sends every change through an independent checker, and keeps your tests at full strength.
product.1.link=https://modonome.com
product.1.linkLabel=Visit site
